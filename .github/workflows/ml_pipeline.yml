name: Pipeline de ML

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
    contents: write

jobs:
    test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                python-version: [3.10, 3.11]
        
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version }}
                cache: "pip"
                cache-dependency-path: requirements.txt

            - name: Instalar dependencias
              run: pip install -r requirements.txt

            - name: Lintin con flake8
              run: flake8 src/ tests/ --max-line-length=100

            - name: Test con pytest
              run: pytest tests/ -v
    
    entrenar-y-publicar:
        runs-on: ubuntu-latest
        needs: test

        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 0
                token: ${{ secrets.GH_PAT }}

            - uses: actions/setup-python@v5
              with:
                python-version: "3.11"
                cache: "pip"
                cache-dependency-path: requirements.txt

            - name: Instalar dependencias
              run: pip install -r requirements.txt

            - name: Entrenar modelo
              run: python src/train.py --config config/config.yaml

            - name: Evaluar modelo
              run: python src/evaluate.py --config config/config.yaml

            - name: Generar reporte HTML
              run: python src/generate_report.py --config config/config.yaml

            - name: Guardar artefactos del pipeline
              uses: actions/upload-artifact@v4
              with:
                name: resultados-${{ github.run_number }}
                path: |
                  outputs/metrics.json
                  outputs/report.html
                  outputs/model.pkl
                retention-days: 30

            - name: Publicar reporte en GitHub Pages
              run: |
                git config user.name "github-actions[bot]"
                git config user.email "github-actions[bot]@users.noreply.github.com"
                git add docs/
                git diff --staged --quiet || \
                  git commit -m "Actualizar reporte de métricas [skip ci]"
                git push